# environment variables needed
# mandatory
netcentral.temp.dir=${NETCENTRAL_SERVER_TEMP_DIR:/netcentral/tmp}
# must end with /
netcentral.temp.dir.report=${NETCENTRAL_SERVER_TEMP_DIR:/netcentral/tmp}/reports/
# must NOT end with /
netcentral.temp.dir.log=${NETCENTRAL_SERVER_TEMP_DIR:/netcentral/tmp}/logs
# optional
micronaut.server.port=${NETCENTRAL_SERVER_HTTP_PORT:8880}
micronaut.server.ssl.port=${NETCENTRAL_SERVER_HTTPS_PORT:4440}
netcentral.update.port=${NETCENTRAL_SERVER_UPDATE_HTTP_PORT:8881}
netcentral.federated=${NETCENTRAL_SERVER_FEDERATED:true}
netcentral.log.rawpackets=${NETCENTRAL_SERVER_LOG_RAW_PACKETS:false}
netcentral.federated.push.udp=${NETCENTRAL_SERVER_FEDERATED_PUSH_UDP:false}
netcentral.federated.push.message=${NETCENTRAL_SERVER_FEDERATED_PUSH_MESSAGE:true}
netcentral.federated.interrogate=${NETCENTRAL_SERVER_FEDERATED_INTERROGATE:false}
netcentral.help.verbose=${NETCENTRAL_SERVER_HELP_VERBOSE:true}

netcentral.osmserver.port=${NETCENTRAL_OSMPC_HTTP_PORT:8889}
netcentral.osmserver.host=${NETCENTRAL_OSMPC_HOSTNAME:localhost}
netcentral.osmserver.precache=${NETCENTRAL_OSMPC_PRECACHE:false}

# end environment variables needed

micronaut.application.name=netcentral-server
micronaut.serde.serialization.inclusion=ALWAYS
micronaut.data.jdbc.connection.read-only=false

threads.count=20
netcentral.queue.objecthandler.threads=4
threads.listener.pause.seconds=5
micronaut.security.authentication=session
micronaut.security.redirect.login-success=/
micronaut.security.redirect.login-failure=/authFailed
micronaut.server.cors.enabled=true
micronaut.metrics.enabled=true
micronaut.executors.io.fixed.n-threads=30

netcentral.aprs.object.beacon.minutes=10
netcentral.net.report.minutes=10
netcentral.aprs.bulletin.announce=BLN0
netcentral.report.cleanup.minutes=10
netcentral.object.cleanup.minutes=14400
netcentral.schedulednet.check.minutes=1

netcentral.update.url=*

netcentral.participant.reminder.minutes=60
netcentral.queue.objecthandler.size=1500

# support information
netcentral.support.contact.name=John Rokicki
netcentral.support.contact.callsign=KC1VMZ
netcentral.support.contact.email=kc1vmz@gmail.com

#default map bounds
netcentral.map.default.latitude.min=15
netcentral.map.default.latitude.max=75
netcentral.map.default.longitude.min=-180
netcentral.map.default.longitude.max=-45

#default aprs net manager
netcentral.aprsnetmgr.enabled=false
netcentral.aprsnetmgr.callsign=NOCALL
netcentral.aprsnetmgr.lon=0
netcentral.aprsnetmgr.lat=0

